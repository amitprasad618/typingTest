<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="description" content="Free online typing speed test. Test your WPM (words per minute) with multiple difficulty levels and improve your typing skills." />
    <meta name="keywords" content="typing test, typing speed test, WPM test, online typing practice, free typing test, measure typing speed" />
    <meta name="author" content="Typing Test" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- Open Graph Tags for Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Free Typing Speed Test - Check Your WPM Online" />
    <meta property="og:description" content="Test your typing speed in one minute. Free online typing test with multiple difficulty levels and random text practice." />
    <meta property="og:image" content="/images/og-image.png" />
    <meta property="og:url" content="https://typingtest.example.com/" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Typing Speed Test - Check Your WPM Online" />
    <meta name="twitter:description" content="Test your typing speed in one minute. Improve your WPM with our free typing test." />
    <meta name="twitter:image" content="/images/og-image.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://typingtest.example.com/" />
    
    <!-- Structured Data - Web Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Free Typing Speed Test",
      "description": "Free online typing speed test to measure your WPM (words per minute) with multiple difficulty levels",
      "url": "https://typingtest.example.com",
      "applicationCategory": "EducationalApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1250"
      }
    }
    </script>
    
    <title>Free Typing Speed Test - Check Your WPM Online</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
